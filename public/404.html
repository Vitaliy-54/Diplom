<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ошибка 404</title>
    <style>
        body {
            background-color: #121212;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            position: relative;
        }
        h1 {
            font-size: 100px;
            color: #ff6b6b;
            margin: 0;
            animation: flicker 1.0s infinite alternate;
        }
        p {
            font-size: 20px;
        }
        a {
            text-decoration: none;
            color: #ff6b6b;
            font-size: 18px;
            border: 2px solid #ff6b6b;
            padding: 10px 20px;
            border-radius: 5px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        a:hover {
            background-color: #ff6b6b;
            color: #fff;
            box-shadow: 0 0 10px #ff6b6b;
        }
        @keyframes flicker {
            from { opacity: 1; }
            to { opacity: 0.7; }
        }
        .ghost {
            width: 80px;
            height: 80px;
            position: top;
            animation: float 3s infinite alternate ease-in-out;
        }
        @keyframes float {
            from { transform: translateY(0); }
            to { transform: translateY(-30px); }
        }
    </style>
</head>
<body>
    <div class="container">
	<img src="https://neocalc.site/404.png" alt="Призрак" class="ghost">
        <h1>404</h1>
        <p>Ой! Похоже, ты оказался в темном уголке интернета...</p>
        <p>Не переживай, просто нажми на кнопку ниже, чтобы вернуться домой!</p>
        <a href="/">Вернуться на главную</a>
        
    </div>
</body>
</html>
